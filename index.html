<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymPlan">
<meta name="theme-color" content="#0b0e14">
<title>GymPlan</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0e14'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%23ff5a36'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0b0e14; --bg2:#121826; --card:#161d2e; --card2:#1c2436;
    --line:#26304a; --txt:#e8ecf5; --muted:#8a96b0; --accent:#ff5a36;
    --accent2:#ffb13b; --green:#34d39e; --blue:#4d9dff; --mscl:#2c3651;
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"SF Pro",system-ui,sans-serif;overscroll-behavior-y:none}
  body{padding-bottom:calc(78px + var(--safe-bot))}
  .header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:calc(14px + var(--safe-top)) 18px 10px;}
  .header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
  .header h1 small{font-size:12px;color:var(--muted);font-weight:600}
  .wrap{padding:0 14px 20px;max-width:680px;margin:0 auto}

  .days{display:flex;gap:8px;overflow-x:auto;padding:6px 0 12px;scrollbar-width:none}
  .days::-webkit-scrollbar{display:none}
  .day{flex:0 0 auto;padding:10px 16px;border-radius:14px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--muted);white-space:nowrap}
  .day.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1205;border-color:transparent}
  .day b{display:block;font-size:11px;font-weight:600;opacity:.8}

  /* Split-Umschalter + Frequenz-Check */
  .splits{display:flex;gap:8px;padding:2px 0 10px}
  .split{flex:1;text-align:center;padding:10px 8px;border-radius:14px;background:var(--card);border:1px solid var(--line);font-weight:800;font-size:14px;color:var(--muted)}
  .split.active{background:linear-gradient(135deg,var(--blue),#7cc4ff);color:#04121f;border-color:transparent}
  .split b{display:block;font-size:10.5px;font-weight:600;opacity:.85}
  .freq{display:flex;gap:6px;flex-wrap:wrap;padding:0 0 12px}
  .fchip{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--muted)}
  .fchip b{color:var(--accent2)}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:14px;overflow:hidden}
  .ex-head{padding:14px 16px;display:flex;align-items:center;gap:12px}
  .ex-num{flex:0 0 34px;height:34px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent2);font-size:15px}
  .ex-title{flex:1;min-width:0}
  .ex-title select{width:100%;background:transparent;border:none;color:var(--txt);font-size:16px;font-weight:700;appearance:none;padding:2px 0}
  .ex-title .muscle{font-size:12px;color:var(--muted);font-weight:600;margin-top:1px}

  .ex-body{padding:0 16px 16px}

  /* Muskel-Grafik + Demo */
  .visual{display:flex;gap:10px;margin-bottom:12px}
  .mmap{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center}
  .mmap .mlbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .mmap .mnames{font-size:11px;color:var(--accent2);font-weight:700;margin-top:2px;line-height:1.3}
  .mmap svg{width:100%;height:auto;max-height:150px}
  .demo{flex:0 0 96px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--txt);text-decoration:none;padding:8px}
  .demo .play{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;color:#1a1205}
  .demo span{font-size:11px;font-weight:700;text-align:center;line-height:1.2}
  .illu{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center;display:flex;flex-direction:column}
  .illu .mlbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
  .illu svg{width:100%;height:auto;max-height:118px;margin:4px 0;flex:1}
  .vbtn{margin-top:auto;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1205;font-weight:800;font-size:12px;padding:7px;border-radius:10px;text-decoration:none}

  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
  .field{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:8px 10px;text-align:center}
  .field label{display:block;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
  .field .row{display:flex;align-items:center;justify-content:center;gap:6px}
  .field input{width:48px;background:transparent;border:none;color:var(--txt);font-size:20px;font-weight:800;text-align:center}
  .field .unit{font-size:12px;color:var(--muted);font-weight:700}
  .stepbtn{width:26px;height:26px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-size:16px;font-weight:800;flex:0 0 auto;display:flex;align-items:center;justify-content:center}

  .weightbar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px}
  .weightbar label{font-size:12px;color:var(--muted);font-weight:700;flex:1}
  .weightbar input{width:80px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:22px;font-weight:800;text-align:center;padding:6px 4px}
  .weightbar .unit{color:var(--muted);font-weight:700}

  .sets{display:flex;gap:8px;flex-wrap:wrap}
  .setdot{width:42px;height:42px;border-radius:12px;background:var(--bg2);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--muted);font-size:15px;transition:.15s}
  .setdot.done{background:linear-gradient(135deg,var(--green),#22b07f);color:#04261b;border-color:transparent}

  .startrest{margin-top:12px;width:100%;padding:13px;border-radius:14px;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}

  .timer{position:fixed;inset:0;z-index:60;background:rgba(7,10,16,.94);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .timer.show{display:flex}
  .timer .ring{position:relative;width:240px;height:240px;margin-bottom:8px}
  .timer svg{transform:rotate(-90deg)}
  .timer .time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .timer .time b{font-size:58px;font-weight:800;letter-spacing:-2px}
  .timer .time span{color:var(--muted);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px}
  .timer .tctrl{display:flex;gap:12px;margin-top:18px}
  .timer .tctrl button{padding:14px 22px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-weight:800;font-size:16px}
  .timer .tctrl .skip{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1205;border:none}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
  .card h3{font-size:16px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .card p.sub{color:var(--muted);font-size:13px;line-height:1.5}
  .macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
  .macro{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center}
  .macro b{display:block;font-size:22px;font-weight:800}
  .macro span{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .macro.k b{color:var(--accent2)} .macro.p b{color:var(--green)} .macro.c b{color:var(--blue)} .macro.f b{color:var(--accent)}

  .meal{border-bottom:1px solid var(--line);padding:13px 0;display:flex;gap:12px}
  .meal:last-child{border-bottom:none;padding-bottom:0}
  .meal .mtime{flex:0 0 54px;font-weight:800;color:var(--accent2);font-size:13px;padding-top:2px}
  .meal .mbody{flex:1}
  .meal .mbody b{font-size:15px;font-weight:800;display:block;margin-bottom:3px}
  .meal .mbody p{font-size:13px;color:var(--muted);line-height:1.5}
  .meal .mkcal{font-size:11px;color:var(--green);font-weight:800;margin-top:4px;display:inline-block;background:rgba(52,211,158,.12);padding:2px 8px;border-radius:8px}
  .alt-note{font-size:12px;color:var(--blue);margin-top:5px;font-weight:600}

  .tip{background:linear-gradient(135deg,rgba(255,90,54,.12),rgba(255,177,59,.08));border:1px solid rgba(255,90,54,.25);border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.55;color:var(--txt)}
  .tip b{color:var(--accent2)}

  ul.clean{list-style:none}
  ul.clean li{padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;display:flex;gap:10px;line-height:1.4}
  ul.clean li:last-child{border-bottom:none}
  ul.clean li span{color:var(--accent2);font-weight:800}

  /* Fortschritt */
  .prog{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 16px;margin-bottom:12px}
  .prog .ptop{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
  .prog .pname{font-size:15px;font-weight:800} .prog .ptag{font-size:11px;color:var(--muted);font-weight:600}
  .prog .pcur{text-align:right} .prog .pcur b{font-size:22px;font-weight:800;color:var(--accent2)} .prog .pcur span{font-size:11px;color:var(--muted);display:block}
  .prog .pdelta{font-size:11px;font-weight:800;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:2px}
  .pup{background:rgba(52,211,158,.15);color:var(--green)} .pflat{background:rgba(138,150,176,.15);color:var(--muted)}
  .prog svg{width:100%;height:auto;margin-top:4px}
  .empty{text-align:center;color:var(--muted);font-size:14px;line-height:1.6;padding:40px 20px}
  .empty .big{font-size:40px;display:block;margin-bottom:10px}

  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(11,14,20,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(8px + var(--safe-bot))}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted);font-size:10.5px;font-weight:700}
  .tab .ic{font-size:20px}
  .tab.active{color:var(--accent2)}

  .page{display:none} .page.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hint{text-align:center;color:var(--muted);font-size:12px;padding:8px 20px 2px;line-height:1.5}
  .reset{display:block;margin:18px auto 0;background:none;border:1px solid var(--line);color:var(--muted);padding:9px 16px;border-radius:12px;font-size:12px;font-weight:700}
</style>
</head>
<body>

<div class="header"><h1>💪 GymPlan <small id="hdrSub"></small></h1></div>

<!-- ===== TRAINING ===== -->
<div class="page active" id="page-train">
  <div class="wrap">
    <div class="splits" id="splitTabs"></div>
    <div class="freq" id="freqBar"></div>
    <div class="days" id="dayTabs"></div>
    <div id="exList"></div>
    <p class="hint">Gewichte, Häkchen & Verlauf werden auf deinem iPhone gespeichert. Tippe einen Satz an, um die Pause-Uhr zu starten.</p>
    <button class="reset" onclick="resetDay()">Sätze für heute zurücksetzen</button>
  </div>
</div>

<!-- ===== FORTSCHRITT ===== -->
<div class="page" id="page-prog"><div class="wrap" id="progWrap"></div></div>

<!-- ===== ERNÄHRUNG ===== -->
<div class="page" id="page-food"><div class="wrap" id="foodWrap"></div></div>

<!-- ===== INFO ===== -->
<div class="page" id="page-info"><div class="wrap" id="infoWrap"></div></div>

<!-- Rest timer -->
<div class="timer" id="timer">
  <div class="ring">
    <svg width="240" height="240">
      <circle cx="120" cy="120" r="108" stroke="#26304a" stroke-width="14" fill="none"/>
      <circle id="ring" cx="120" cy="120" r="108" stroke="url(#tg)" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-dasharray="678.58" stroke-dashoffset="0"/>
      <defs><linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff5a36"/><stop offset="1" stop-color="#ffb13b"/>
      </linearGradient></defs>
    </svg>
    <div class="time"><b id="tNum">90</b><span>Pause</span></div>
  </div>
  <div class="tctrl">
    <button onclick="addTime(-15)">−15s</button>
    <button onclick="addTime(15)">+15s</button>
    <button class="skip" onclick="stopTimer()">Fertig</button>
  </div>
</div>

<div class="tabbar">
  <div class="tab active" data-pg="train"><div class="ic">🏋️</div>Training</div>
  <div class="tab" data-pg="prog"><div class="ic">📈</div>Fortschritt</div>
  <div class="tab" data-pg="food"><div class="ic">🍽️</div>Ernährung</div>
  <div class="tab" data-pg="info"><div class="ic">📊</div>Info</div>
</div>

<script>
/* =================== TRAININGSPLAN =================== */
/* mg = trainierte Muskelregionen (für die Körpergrafik) */
const PLAN = {
  push:{ name:"Push", sub:"Brust · Schulter · Trizeps", ex:[
    {muscle:"Brust",       sets:4, reps:"8–10", rest:120, mg:["chest","deltF"], opts:["Bankdrücken (Langhantel)","Bankdrücken (Kurzhantel)","Brustpresse (Maschine)"]},
    {muscle:"Obere Brust", sets:3, reps:"10–12",rest:90,  mg:["chest","deltF"], opts:["Schrägbankdrücken (Kurzhantel)","Schrägbankdrücken (Langhantel)","Schräg-Brustpresse (Maschine)"]},
    {muscle:"Brust",       sets:3, reps:"12–15",rest:75,  mg:["chest"], opts:["Butterfly (Maschine)","Kabel-Crossover","Fliegende (Kurzhantel)"]},
    {muscle:"Schulter",    sets:4, reps:"8–12", rest:90,  mg:["deltF","deltS","triceps"], opts:["Schulterdrücken (Kurzhantel)","Schulterdrücken (Langhantel)","Schulterpresse (Maschine)"]},
    {muscle:"Seitl. Schulter",sets:4,reps:"12–15",rest:60,mg:["deltS"], opts:["Seitheben (Kurzhantel)","Seitheben (Kabel)","Seitheben (Maschine)"]},
    {muscle:"Trizeps",     sets:4, reps:"10–12",rest:60,  mg:["triceps"], opts:["Trizepsdrücken (Kabel)","Dips","Überkopf-Trizeps (Kurzhantel)"]},
  ]},
  pull:{ name:"Pull", sub:"Rücken · Bizeps", ex:[
    {muscle:"Rücken (breit)",sets:4,reps:"6–10",rest:120,mg:["lats","biceps"], opts:["Klimmzüge","Latzug breit","Latzug (Maschine)"]},
    {muscle:"Rücken (dick)", sets:4,reps:"8–10",rest:100,mg:["lats","midback","biceps"], opts:["Langhantelrudern","Kabelrudern sitzend","T-Bar-Rudern"]},
    {muscle:"Rücken (oben)", sets:3,reps:"10–12",rest:90,mg:["lats","midback"], opts:["Latzug eng","Enger Kabelzug","Klimmzug eng"]},
    {muscle:"Hint. Schulter",sets:3,reps:"15–20",rest:60,mg:["deltR","midback"], opts:["Face Pulls (Kabel)","Reverse Butterfly","Reverse Fliegende (Kurzhantel)"]},
    {muscle:"Bizeps",        sets:4,reps:"8–12",rest:75, mg:["biceps"], opts:["Langhantel-Curls","SZ-Stange-Curls","Kurzhantel-Curls"]},
    {muscle:"Bizeps/Unterarm",sets:3,reps:"10–12",rest:60,mg:["biceps","forearm"], opts:["Hammer-Curls","Kabel-Curls","Konzentrations-Curls"]},
  ]},
  legs:{ name:"Legs", sub:"Beine · Bauch", ex:[
    {muscle:"Quadrizeps",  sets:4,reps:"6–10",rest:150,mg:["quads","glutes"], opts:["Kniebeugen (Langhantel)","Beinpresse","Goblet Squats"]},
    {muscle:"Beinbeuger",  sets:4,reps:"8–10",rest:100,mg:["hams","glutes"], opts:["Rumänisches Kreuzheben","Beinbeuger liegend","Good Mornings"]},
    {muscle:"Quadrizeps",  sets:3,reps:"12–15",rest:75,mg:["quads"], opts:["Beinstrecker (Maschine)","Ausfallschritte","Step-ups"]},
    {muscle:"Gesäß/Beine", sets:3,reps:"10–12",rest:90,mg:["glutes","quads"], opts:["Beinpresse","Hip Thrust","Bulgarian Split Squats"]},
    {muscle:"Waden",       sets:4,reps:"12–20",rest:60,mg:["calves"], opts:["Wadenheben stehend","Wadenheben sitzend","Wadenpresse"]},
    {muscle:"Bauch",       sets:3,reps:"12–20",rest:60,mg:["abs"], opts:["Beinheben","Crunches (Kabel)","Plank (Sek.)"]},
  ]},
  legsfull:{ name:"Legs komplett", sub:"Beine · Gesäß · Waden · Bauch", ex:[
    {muscle:"Quadrizeps",     sets:4,reps:"6–10", rest:150,mg:["quads","glutes"], opts:["Kniebeugen (Langhantel)","Beinpresse","Goblet Squats"]},
    {muscle:"Beinbeuger",     sets:4,reps:"8–10", rest:100,mg:["hams","glutes"], opts:["Rumänisches Kreuzheben","Beinbeuger liegend","Good Mornings"]},
    {muscle:"Quadrizeps/Gesäß",sets:3,reps:"10–12",rest:90,mg:["quads","glutes"], opts:["Beinpresse","Ausfallschritte","Bulgarian Split Squats"]},
    {muscle:"Quadrizeps",     sets:3,reps:"12–15",rest:75, mg:["quads"], opts:["Beinstrecker (Maschine)","Step-ups","Goblet Squats"]},
    {muscle:"Beinbeuger",     sets:3,reps:"12–15",rest:75, mg:["hams"], opts:["Beinbeuger liegend","Rumänisches Kreuzheben","Good Mornings"]},
    {muscle:"Gesäß",          sets:3,reps:"10–12",rest:90, mg:["glutes","hams"], opts:["Hip Thrust","Bulgarian Split Squats","Beinpresse"]},
    {muscle:"Waden",          sets:4,reps:"12–20",rest:60, mg:["calves"], opts:["Wadenheben stehend","Wadenheben sitzend","Wadenpresse"]},
    {muscle:"Bauch",          sets:3,reps:"12–20",rest:60, mg:["abs"], opts:["Beinheben","Crunches (Kabel)","Plank (Sek.)"]},
  ]},
  upper:{ name:"Oberkörper-Mix", sub:"Brust · Rücken · Schulter · Arme + Cardio", ex:[
    {muscle:"Brust",   sets:3,reps:"8–12", rest:90,mg:["chest","deltF"], opts:["Bankdrücken (Kurzhantel)","Brustpresse (Maschine)","Kabel-Crossover"]},
    {muscle:"Rücken",  sets:3,reps:"8–12", rest:90,mg:["lats","biceps"], opts:["Latzug breit","Kabelrudern sitzend","Klimmzüge"]},
    {muscle:"Schulter",sets:3,reps:"10–12",rest:75,mg:["deltF","deltS"], opts:["Schulterdrücken (Kurzhantel)","Schulterpresse (Maschine)","Seitheben (Kurzhantel)"]},
    {muscle:"Bizeps",  sets:3,reps:"10–12",rest:60,mg:["biceps"], opts:["Kurzhantel-Curls","Kabel-Curls","Hammer-Curls"]},
    {muscle:"Trizeps", sets:3,reps:"10–12",rest:60,mg:["triceps"], opts:["Trizepsdrücken (Kabel)","Dips","Überkopf-Trizeps (Kurzhantel)"]},
    {muscle:"Cardio",  sets:1,reps:"15–20 Min",rest:60,mg:["quads","calves"], opts:["Laufband (Steigung)","Fahrrad-Ergometer","Rudergerät"]},
  ]},
};
const DAYS = Object.keys(PLAN);

/* =================== SPLITS (2 Trainingspläne) =================== */
const SPLITS = {
  ppl:{ label:"3er Split", sub:"Push · Pull · Legs", days:["push","pull","legs"], wd:["Mo","Mi","Fr"],
    freq:[["Brust","1×"],["Rücken","1×"],["Schulter","1×"],["Arme","1×"],["Beine","1×"]] },
  four:{ label:"4er Split", sub:"Mo · Mi · Fr · Sa + Cardio", days:["push","pull","legsfull","upper"], wd:["Mo","Mi","Fr","Sa"],

}
let curSplit = (store._split && SPLITS[store._split]) ? store._split : "ppl";
let curDay = SPLITS[curSplit].days[0];

function renderSplits(){
  const el=document.getElementById("splitTabs"); el.innerHTML="";
  Object.keys(SPLITS).forEach(s=>{
    const sp=SPLITS[s];
    const b=document.createElement("div");
    b.className="split"+(s===curSplit?" active":"");
    b.innerHTML=`${sp.label}<b>${sp.sub}</b>`;
    b.onclick=()=>{ curSplit=s; store._split=s; save(); curDay=SPLITS[s].days[0]; renderSplits(); renderDays(); renderEx(); };
    el.appendChild(b);
  });
  renderFreq();
}
function renderFreq(){
  document.getElementById("freqBar").innerHTML =
    SPLITS[curSplit].freq.map(f=>`<div class="fchip">${f[0]} <b>${f[1]}/Wo</b></div>`).join("");
}
function renderDays(){
  const el = document.getElementById("dayTabs"); el.innerHTML="";
  const sp=SPLITS[curSplit];
  sp.days.forEach((d,idx)=>{
    const p=PLAN[d];
    const b=document.createElement("div");
    b.className="day"+(d===curDay?" active":"");
    b.innerHTML=`${sp.wd[idx]} · ${p.name}<b>${p.sub}</b>`;
    b.onclick=()=>{curDay=d;renderDays();renderEx();};
    el.appendChild(b);
  });
  document.getElementById("hdrSub").textContent = PLAN[curDay].name+" Tag";
}

function renderEx(){
  const wrap=document.getElementById("exList"); wrap.innerHTML="";
  PLAN[curDay].ex.forEach((ex,i)=>{
    const st=exState(curDay,i);
    const card=document.createElement("div"); card.className="ex";
    const opts=ex.opts.map((o,oi)=>`<option value="${oi}" ${oi==st.opt?"selected":""}>${o}</option>`).join("");
    const mnames=ex.mg.map(k=>MG_LABEL[k]).join(" · ");
    const curName=ex.opts[st.opt];
    let dots="";
    for(let s=0;s<st.sets;s++){ dots+=`<div class="setdot ${s<st.done?'done':''}" data-s="${s}">${s+1}</div>`; }

    card.innerHTML=`
      <div class="ex-head">
        <div class="ex-num">${i+1}</div>
        <div class="ex-title">
          <select class="optsel">${opts}</select>
          <div class="muscle">${ex.muscle} · ${ex.opts.length} Varianten</div>
        </div>
      </div>
      <div class="ex-body">
        <div class="visual">
          <div class="illu">
            <div class="mlbl">So geht's</div>
            ${ILLUS[VARILL[curDay][i][st.opt]]||ILLUS[VARILL[curDay][i][0]]||''}
            <a class="vbtn" href="https://www.youtube.com/results?search_query=${encodeURIComponent(curName+' Ausführung Technik')}" target="_blank" rel="noopener">▶ Video ansehen</a>
          </div>
          <div class="mmap">
            <div class="mlbl">Trainierte Muskeln</div>
            ${bodySVG(ex.mg)}
            <div class="mnames">${mnames}</div>
          </div>
        </div>
        <div class="grid3">
          <div class="field"><label>Sätze</label><div class="row">
            <button class="stepbtn" data-act="s-">−</button><input class="setsIn" value="${st.sets}" readonly><button class="stepbtn" data-act="s+">+</button>
          </div></div>
          <div class="field"><label>Wdh.</label><div class="row"><span style="font-size:18px;font-weight:800">${ex.reps}</span></div></div>
          <div class="field"><label>Pause</label><div class="row">
            <button class="stepbtn" data-act="r-">−</button><input class="restIn" value="${st.rest}" readonly><span class="unit">s</span><button class="stepbtn" data-act="r+">+</button>
          </div></div>
        </div>
        <div class="weightbar">
          <label>🏋️ Aktuelles Gewicht</label>
          <input class="wIn" type="number" inputmode="decimal" placeholder="–" value="${st.weight}"><span class="unit">kg</span>
        </div>
        <div class="sets">${dots}</div>
        <button class="startrest" data-act="rest">⏱️ Pause starten (${st.rest}s)</button>
      </div>`;

    card.querySelector(".optsel").onchange=e=>{st.opt=+e.target.value;save();renderEx();};
    const wIn=card.querySelector(".wIn");
    wIn.oninput=e=>{st.weight=e.target.value;save();};
    wIn.onchange=e=>{logWeight(curDay,i,e.target.value);};   // Verlauf protokollieren
    card.querySelectorAll(".stepbtn").forEach(b=>b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="s+"&&st.sets<8)st.sets++; if(a==="s-"&&st.sets>1){st.sets--; if(st.done>st.sets)st.done=st.sets;}
      if(a==="r+")st.rest+=15; if(a==="r-"&&st.rest>15)st.rest-=15;
      save();renderEx();
    });
    card.querySelectorAll(".setdot").forEach(d=>d.onclick=()=>{
      const s=+d.dataset.s;
      st.done = (s+1===st.done)? s : s+1;
      st.doneDay=dayKey(); save(); vibrate(); renderEx();
      if(st.done>0 && s+1===st.done) startTimer(st.rest);
    });
    card.querySelector('[data-act="rest"]').onclick=()=>startTimer(st.rest);
    wrap.appendChild(card);
  });
}
function resetDay(){ const d=store[curDay]||{}; Object.values(d).forEach(s=>s.done=0); save(); renderEx(); }

/* ===== Gewichts-Verlauf ===== */
function logWeight(d,i,w){
  if(w===""||isNaN(+w)||+w<=0)return;
  const st=exState(d,i); const today=dayKey();
  const last=st.hist[st.hist.length-1];
  if(last && last.d===today) last.w=+w;
  else st.hist.push({d:today,w:+w});
  save();
}

/* =================== FORTSCHRITT =================== */
function chartSVG(hist,id){
  const W=300,H=110,pad=20,n=hist.length;
  const ws=hist.map(p=>p.w), mn=Math.min(...ws), mx=Math.max(...ws), range=(mx-mn)||1;
  const x=i=> n===1? W/2 : pad+(W-2*pad)*i/(n-1);
  const y=w=> H-pad-(H-2*pad)*(w-mn)/range;
  const pts=hist.map((p,i)=>`${x(i).toFixed(1)},${y(p.w).toFixed(1)}`).join(" ");
  const dots=hist.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(p.w).toFixed(1)}" r="3.5" fill="var(--accent2)"/>`).join("");
  const area=`${pad},${H-pad} ${pts} ${x(n-1).toFixed(1)},${H-pad}`;
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="cg${id}" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#ff5a36"/><stop offset="1" stop-color="#ffb13b"/></linearGradient>
    <linearGradient id="ca${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(255,90,54,.25)"/><stop offset="1" stop-color="rgba(255,90,54,0)"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#ca${id})"/>
    <polyline points="${pts}" fill="none" stroke="url(#cg${id})" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="3" y="${(y(mx)+4).toFixed(1)}" fill="var(--muted)" font-size="10" font-weight="700">${mx}kg</text>
    <text x="3" y="${(y(mn)+4).toFixed(1)}" fill="var(--muted)" font-size="10" font-weight="700">${mn}kg</text>
  </svg>`;
}
function renderProg(){
  const w=document.getElementById("progWrap"); let html=""; let any=false; let cid=0;
  DAYS.forEach(d=>{
    PLAN[d].ex.forEach((ex,i)=>{
      const st=(store[d]&&store[d][i]); if(!st||!st.hist||st.hist.length<1)return;
      any=true; cid++;
      const first=st.hist[0].w, cur=st.hist[st.hist.length-1].w, diff=+(cur-first).toFixed(1);
      const name=ex.opts[st.opt||0];
      const deltaCls=diff>0?"pup":"pflat";
      const deltaTxt=diff>0?`▲ +${diff} kg seit Start`:(diff<0?`▼ ${diff} kg`:`gleich`);
      html+=`<div class="prog">
        <div class="ptop">
          <div><div class="pname">${name}</div><div class="ptag">${PLAN[d].name} · ${ex.muscle} · ${st.hist.length} Einträge</div>
            <div class="pdelta ${deltaCls}">${deltaTxt}</div></div>
          <div class="pcur"><b>${cur}</b><span>kg aktuell</span></div>
        </div>
        ${st.hist.length>=2?chartSVG(st.hist,cid):'<div class="ptag" style="padding:6px 0">Noch ein zweiter Eintrag nötig für die Kurve 📈</div>'}
      </div>`;
    });
  });
  w.innerHTML = any ? `<div class="tip" style="margin-bottom:14px">📈 <b>Dein Ziel:</b> Jede Kurve soll langsam nach oben gehen. Trag nach jedem Training dein Gewicht ein – jeder Eintrag wird hier zu einem Punkt im Verlauf.</div>`+html
    : `<div class="empty"><span class="big">📈</span><b>Noch keine Daten.</b><br>Trag im Training bei den Übungen dein Gewicht ein – dann erscheint hier automatisch deine Fortschritts-Kurve pro Übung.</div>`;
}

/* =================== REST TIMER =================== */
let tInt=null, tLeft=0, tTotal=0; const RING_LEN=678.58;
function startTimer(sec){ tTotal=sec; tLeft=sec; showTimer(); tick(); clearInterval(tInt); tInt=setInterval(()=>{ tLeft--; if(tLeft<=0){done();} tick(); },1000); }
function tick(){ document.getElementById("tNum").textContent=tLeft>=0?tLeft:0; document.getElementById("ring").style.strokeDashoffset=RING_LEN*(1-tLeft/tTotal); }
function addTime(s){ tLeft=Math.max(1,tLeft+s); if(tLeft>tTotal)tTotal=tLeft; tick(); }
function showTimer(){ document.getElementById("timer").classList.add("show"); }
function stopTimer(){ clearInterval(tInt); document.getElementById("timer").classList.remove("show"); }
function done(){ clearInterval(tInt); beep(); vibrate(true); setTimeout(stopTimer,600); }
function vibrate(strong){ if(navigator.vibrate) navigator.vibrate(strong?[120,60,120]:30); }
let AC;
function beep(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  [0,0.18,0.36].forEach(t=>{ const o=AC.createOscillator(),g=AC.createGain(); o.frequency.value=880; o.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0.001,AC.currentTime+t); g.gain.exponentialRampToValueAtTime(0.4,AC.currentTime+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+t+0.15); o.start(AC.currentTime+t); o.stop(AC.currentTime+t+0.16); });
}catch(e){} }

/* =================== ERNÄHRUNG =================== */

  {t:"10:30",n:"Snack 1",d:"250 g Magerquark, 50 g Walnüsse, 1 Apfel, Honig.",k:520,alt:"Alternative: Protein-Shake + 2 Reiswaffeln mit Erdnussbutter."},
  {t:"13:00",n:"Mittagessen",d:"200 g Hähnchenbrust, 120 g Reis (roh), Brokkoli + Paprika, Olivenöl.",k:720,alt:"Alternative: 200 g Rindfleisch / Lachs + Süßkartoffel + Salat."},
  {t:"16:30",n:"Pre-Workout",d:"150 g Reis oder 2 Scheiben Vollkornbrot + 150 g Putenbrust + Gemüse.",k:480,alt:"Alternative: 80 g Couscous + 200 g Magerquark + Obst."},

  {t:"22:00",n:"Vor dem Schlafen",d:"250 g Magerquark + 30 g Mandeln + Zimt (langsames Protein über Nacht).",k:380,alt:"Alternative: Casein-Shake + 1 EL Leinsamen."},
]};

  const ml=NUTRI.meals.map(m=>`<div class="meal"><div class="mtime">${m.t}</div>
    <div class="mbody"><b>${m.n}</b><p>${m.d}</p><span class="mkcal">≈ ${m.k} kcal</span>

      <div class="macros">
        <div class="macro k"><b>${NUTRI.kcal}</b><span>kcal</span></div>
        <div class="macro p"><b>${NUTRI.protein}g</b><span>Protein</span></div>
        <div class="macro c"><b>${NUTRI.carbs}g</b><span>Carbs</span></div>
        <div class="macro f"><b>${NUTRI.fat}g</b><span>Fett</span></div>
      </div></div>
    <div class="card"><h3>🍽️ Essensplan (6 Mahlzeiten)</h3>${ml}</div>
    <div class="card"><h3>🛒 Einkaufs-Basics</h3><ul class="clean">
      <li><span>Protein</span> Hähnchen, Pute, Rind, Lachs, Eier, Magerquark, Hüttenkäse, Whey/Casein</li>
      <li><span>Carbs</span> Haferflocken, Reis, Kartoffeln, Süßkartoffeln, Vollkornbrot/-pasta, Obst</li>
      <li><span>Fette</span> Olivenöl, Nüsse, Erdnussbutter, Avocado, Leinsamen</li>
      <li><span>Gemüse</span> Brokkoli, Paprika, Spinat, Tomaten, Salat (jede Mahlzeit)</li>
    </ul></div>
    <div class="card"><div class="tip"><b>Faustregeln:</b><br>
      • <b>3–4 L Wasser</b> pro Tag.<br>
      • 1×/Woche morgens wiegen – Ziel: <b>+0,25–0,5 kg/Woche</b>. Zu schnell → 200 kcal Carbs weniger. Stillstand → 200 kcal mehr.<br>
      • Protein über den Tag verteilen (4–5× ~40 g).<br>
      • Kreatin: <b>5 g täglich</b> ist günstig & gut belegt.
    </div></div>`;
}

/* =================== INFO =================== */

  document.getElementById("infoWrap").innerHTML=`
    <div class="card"><h3>📅 Deine zwei Trainingspläne</h3>
      <p class="sub">Oben im Training wechselst du per Reiter zwischen den Splits. Der Frequenz-Check darunter zeigt, wie oft jede Muskelgruppe pro Woche drankommt.</p>

        <li><span>3er</span> Mo Push · Mi Pull · Fr Legs – jeder Muskel 1×/Woche. Perfekt für den Wiedereinstieg.</li>
        <li><span>4er</span> Mo Push · Mi Pull · Fr Legs komplett · Sa Oberkörper-Mix + Cardio – Brust, Rücken, Schultern & Arme 2×/Woche, Beine 1× mit hohem Volumen. Der nächste Schritt, wenn 3× gut läuft.</li>
      </ul>
      <p class="sub" style="margin-top:8px">Push & Pull teilen sich beide Pläne – deine Gewichte dort gelten also in beiden Splits automatisch.</p></div>
    <div class="card"><h3>🔑 Wichtigste Prinzipien</h3>
      <div class="tip"><b>Progressive Überladung:</b> Jede Woche etwas mehr Gewicht oder 1 Wdh. mehr. Schaffst du das obere Ende der Wdh.-Spanne in allen Sätzen → Gewicht erhöhen (meist +2,5 kg). Dein Verlauf-Tab zeigt dir genau, ob es aufwärts geht.</div>
      <ul class="clean" style="margin-top:10px">
        <li><span>1</span> Saubere Technik vor mehr Gewicht.</li>
        <li><span>2</span> Aufwärmen: 2 leichte Sätze vor der ersten schweren Übung.</li>
        <li><span>3</span> Letzte 1–2 Wdh. richtig anstrengend (Reserve ~1–2 Wdh.).</li>
        <li><span>4</span> 7–9 h Schlaf – Muskeln wachsen in der Pause.</li>

    <div class="card"><h3>🧍 Muskel-Grafik & Demos</h3>

    <div class="card"><h3>📱 Als App speichern</h3>
      <p class="sub">Safari → Teilen-Symbol → „Zum Home-Bildschirm". Alle Daten (Gewichte & Verlauf) bleiben lokal auf deinem iPhone.</p></div>
    <div class="card"><div class="tip" style="background:linear-gradient(135deg,rgba(77,157,255,.12),rgba(52,211,158,.08));border-color:rgba(77,157,255,.25)">
      ⚠️ <b>Hinweis:</b> Allgemeine Trainings- & Ernährungsinfos, kein medizinischer Rat. Bei Vorerkrankungen vorher ärztlich abklären.
    </div></div>`;
}

/* =================== Navigation =================== */
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  const pg=t.dataset.pg;
  document.getElementById("page-"+pg).classList.add("active");
  if(pg==="prog")renderProg();
  const titles={train:PLAN[curDay].name+" Tag",prog:"Fortschritt",food:"Ernährung",info:"Info & Tipps"};
  document.getElementById("hdrSub").textContent=titles[pg];
  window.scrollTo(0,0);
});

/* Init */
renderSplits(); renderDays(); renderEx(); renderFood(); renderInfo();
</script>
